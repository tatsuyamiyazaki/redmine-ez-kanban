services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redmine
      POSTGRES_USER: redmine
      POSTGRES_PASSWORD: redmine
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmine -d redmine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redmine:
    image: redmine:6.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      REDMINE_DB_POSTGRES: db
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: redmine
      REDMINE_SECRET_KEY_BASE: dev_secret_key_base_change_me
    volumes:
      # このリポジトリ自体を Redmine プラグインとしてマウント（プラグインID: redmine_ez_kanban）
      - ./:/usr/src/redmine/plugins/redmine_ez_kanban
      - redmine-files:/usr/src/redmine/files

volumes:
  db-data:
  redmine-files:
